<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客管理 | 社内イントラサイト</title>
<link rel="icon" type="image/jpeg" href="logo-mark.jpg">
<link rel="apple-touch-icon" href="logo-mark.jpg">
<style>
  :root {
    --main-color: #2c3e50;
    --accent-color: #3498db;
    --bg-color: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333;
    --imp-a: #e74c3c;
    --imp-b: #f39c12;
    --imp-c: #7f8c8d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
  }
  header {
    background-color: var(--main-color);
    padding: 16px 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  header .h-left { display: flex; align-items: center; gap: 14px; }
  header img { max-height: 44px; height: auto; }
  header .h-title { color: #fff; font-size: 18px; font-weight: 600; }
  header a.back {
    color: #cfe3f3; text-decoration: none; font-size: 13px; white-space: nowrap;
  }
  header a.back:hover { color: #fff; text-decoration: underline; }

  main { max-width: 1040px; margin: 26px auto; padding: 0 20px; }

  /* ツールバー */
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .toolbar input[type=search] {
    flex: 1 1 220px; min-width: 180px;
    padding: 9px 12px; font-size: 14px;
    border: 1px solid #ccd2d8; border-radius: 6px; font-family: inherit;
  }
  .filter-group { display: flex; gap: 6px; }
  .filter-btn {
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    border: 1px solid #ccd2d8; background: #fff; color: #555;
    border-radius: 6px; cursor: pointer;
  }
  .filter-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
  .add-btn {
    margin-left: auto;
    padding: 9px 18px; font-size: 14px; font-weight: 600;
    background: var(--accent-color); color: #fff;
    border: none; border-radius: 6px; cursor: pointer; white-space: nowrap;
  }
  .add-btn:hover { background: #2980b9; }

  .count-line { font-size: 13px; color: #777; margin: 0 2px 10px; }

  /* 一覧テーブル */
  .table-wrap {
    background: var(--card-bg); border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 13px; color: #667;
    background: #f0f3f6; padding: 12px 16px; border-bottom: 1px solid #e3e8ec;
    white-space: nowrap;
  }
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: var(--accent-color); }
  thead th .arrow { font-size: 10px; color: var(--accent-color); }
  tbody td { padding: 13px 16px; border-bottom: 1px solid #eef1f4; font-size: 14px; }
  tbody tr { cursor: pointer; transition: background 0.12s; }
  tbody tr:hover { background: #f6fafd; }
  tbody tr:last-child td { border-bottom: none; }
  td.company { font-weight: 600; color: var(--main-color); }
  .empty-row td { text-align: center; color: #999; padding: 40px 16px; }

  .imp {
    display: inline-block; min-width: 26px; text-align: center;
    font-size: 12px; font-weight: 700; color: #fff;
    border-radius: 5px; padding: 3px 8px;
  }
  .imp-A { background: var(--imp-a); }
  .imp-B { background: var(--imp-b); }
  .imp-C { background: var(--imp-c); }

  footer { text-align: center; padding: 24px; font-size: 12px; color: #999; }

  /* ロック画面 */
  #lock-screen {
    position: fixed; inset: 0; background-color: var(--main-color);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  #lock-box {
    background-color: #fff; border-radius: 10px; padding: 36px 32px;
    width: 90%; max-width: 340px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #lock-box img { max-height: 60px; margin-bottom: 20px; }
  #lock-box input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px;
  }
  #lock-box button {
    width: 100%; padding: 10px; font-size: 15px; background-color: var(--accent-color);
    color: #fff; border: none; border-radius: 6px; cursor: pointer;
  }
  #lock-box button:hover { background-color: #2980b9; }
  #lock-error { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 16px; }
  body.locked > header, body.locked > main, body.locked > footer { display: none; }

  /* モーダル */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center; z-index: 1100;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 10px; padding: 24px;
    max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .modal h3 {
    margin: 0 0 16px; font-size: 17px; color: var(--main-color);
    display: flex; align-items: center; gap: 10px;
  }

  /* 詳細表示 */
  .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .detail-company { font-size: 20px; font-weight: 700; color: var(--main-color); }
  .detail-rep { font-size: 14px; color: #555; margin-bottom: 20px; }
  .detail-rep b { color: #333; font-weight: 600; }
  .section-label {
    font-size: 13px; font-weight: 700; color: var(--accent-color);
    border-left: 4px solid var(--accent-color); padding-left: 8px;
    margin: 22px 0 10px;
  }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .detail-table th, .detail-table td {
    text-align: left; padding: 9px 10px; border-bottom: 1px solid #eef1f4;
  }
  .detail-table th { background: #f6f8fa; color: #667; font-weight: 600; white-space: nowrap; }
  .detail-table td.num { text-align: right; white-space: nowrap; }
  .detail-empty { color: #999; font-size: 13px; padding: 6px 2px; }
  .detail-memo {
    background: #f6f8fa; border-radius: 6px; padding: 12px 14px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: #444;
  }

  /* フォーム */
  .field { margin-bottom: 16px; }
  .field > label { display: block; font-size: 13px; font-weight: 600; color: #556; margin-bottom: 6px; }
  .field > label .req { color: var(--imp-a); font-size: 12px; margin-left: 4px; }
  .field input[type=text], .field input[type=date], .field input[type=number], .field select, .field textarea {
    width: 100%; padding: 9px 11px; font-size: 14px;
    border: 1px solid #ccd2d8; border-radius: 6px; font-family: inherit;
  }
  .field textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

  .rows-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .rows-head label { font-size: 13px; font-weight: 600; color: #556; }
  .row-add {
    font-size: 12px; font-weight: 600; color: var(--accent-color);
    background: #eaf4fb; border: none; border-radius: 5px; padding: 5px 12px; cursor: pointer;
  }
  .row-add:hover { background: #d6ebf8; }
  .dyn-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .dyn-row input { padding: 8px 10px; font-size: 13px; border: 1px solid #ccd2d8; border-radius: 6px; font-family: inherit; }
  .dyn-row .row-del {
    flex: 0 0 auto; width: 30px; height: 34px; border: none; border-radius: 6px;
    background: #f4d7d4; color: #c0392b; font-size: 16px; cursor: pointer; line-height: 1;
  }
  .dyn-row .row-del:hover { background: #efc2bd; }
  .dyn-empty { font-size: 12px; color: #aaa; margin-bottom: 8px; }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }
  .modal button.act { padding: 9px 20px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; }
  .btn-primary { background: var(--accent-color); color: #fff; }
  .btn-primary:hover { background: #2980b9; }
  .btn-secondary { background: #e0e4e8; color: #333; }
  .btn-secondary:hover { background: #d3d8dd; }
  .btn-danger { background: #fff; color: #c0392b; border: 1px solid #e2b6b0 !important; margin-right: auto; }
  .btn-danger:hover { background: #fbeceb; }
  .form-err { color: var(--imp-a); font-size: 13px; min-height: 16px; text-align: right; width: 100%; }

  .db-warn {
    background: #fff4e5; border: 1px solid #ffd699; color: #8a5a00;
    font-size: 13px; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; display: none;
  }

  @media (max-width: 560px) {
    thead th.hide-sp, tbody td.hide-sp { display: none; }
    .dyn-row { flex-wrap: wrap; }
  }
</style>
</head>
<body class="locked">

<!-- ===== ロック画面 ===== -->
<div id="lock-screen">
  <div id="lock-box">
    <img src="yoko_RGB.png" alt="会社ロゴ">
    <form id="lock-form">
      <input type="password" id="lock-password" placeholder="パスワードを入力" autocomplete="current-password" autofocus>
      <button type="submit">入室する</button>
      <div id="lock-error"></div>
    </form>
  </div>
</div>

<header>
  <div class="h-left">
    <img src="yoko_RGB.png" alt="会社ロゴ">
    <span class="h-title">顧客管理</span>
  </div>
  <a class="back" href="https://daito-group.github.io/company-intranet-page/" target="_blank" rel="noopener noreferrer">← ポータルへ戻る</a>
</header>

<main>
  <div class="db-warn" id="db-warn">
    データベースに接続できていません。通信環境をご確認ください。表示・保存が正しく行えない場合があります。
  </div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="🔍 取引先企業名・営業担当で検索">
    <div class="filter-group" id="imp-filter">
      <button type="button" class="filter-btn active" data-imp="ALL">すべて</button>
      <button type="button" class="filter-btn" data-imp="A">A</button>
      <button type="button" class="filter-btn" data-imp="B">B</button>
      <button type="button" class="filter-btn" data-imp="C">C</button>
    </div>
    <button type="button" class="add-btn" id="add-btn">＋ 新規登録</button>
  </div>

  <div class="count-line" id="count-line"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="company">取引先企業名 <span class="arrow" data-arrow="company"></span></th>
          <th class="sortable" data-sort="rep">営業担当 <span class="arrow" data-arrow="rep"></span></th>
          <th class="sortable" data-sort="importance">重要度 <span class="arrow" data-arrow="importance"></span></th>
        </tr>
      </thead>
      <tbody id="cust-body"></tbody>
    </table>
  </div>
</main>

<footer>
  &copy; 2026 社内イントラサイト
</footer>

<!-- ===== 詳細モーダル ===== -->
<div class="overlay" id="detail-overlay">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- ===== 編集モーダル ===== -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <h3 id="edit-title">新規登録</h3>
    <div class="field">
      <label>取引先企業名 <span class="req">必須</span></label>
      <input type="text" id="f-company" placeholder="株式会社〇〇">
    </div>
    <div class="field">
      <label>営業担当</label>
      <input type="text" id="f-rep" placeholder="担当者名">
    </div>
    <div class="field">
      <label>重要度</label>
      <select id="f-importance">
        <option value="A">A（最重要）</option>
        <option value="B" selected>B（重要）</option>
        <option value="C">C（通常）</option>
      </select>
    </div>

    <div class="field">
      <div class="rows-head">
        <label>取引商品・価格</label>
        <button type="button" class="row-add" id="add-product">＋ 商品を追加</button>
      </div>
      <div id="product-rows"></div>
    </div>

    <div class="field">
      <div class="rows-head">
        <label>取引履歴</label>
        <button type="button" class="row-add" id="add-history">＋ 履歴を追加</button>
      </div>
      <div id="history-rows"></div>
    </div>

    <div class="field">
      <label>備考・メモ</label>
      <textarea id="f-memo" placeholder="商談状況・要望・注意点など"></textarea>
    </div>

    <div class="btn-row">
      <button type="button" class="act btn-secondary" id="edit-cancel">キャンセル</button>
      <button type="button" class="act btn-primary" id="edit-save">保存する</button>
      <div class="form-err" id="edit-err"></div>
    </div>
  </div>
</div>

<!-- ===== 削除確認モーダル ===== -->
<div class="overlay" id="confirm-overlay">
  <div class="modal" style="max-width:400px;">
    <h3>削除の確認</h3>
    <p id="confirm-msg" style="font-size:14px;line-height:1.7;margin:0 0 20px;"></p>
    <div class="btn-row">
      <button type="button" class="act btn-secondary" id="confirm-cancel">キャンセル</button>
      <button type="button" class="act btn-primary" id="confirm-ok" style="background:#c0392b;">削除する</button>
    </div>
  </div>
</div>

<!-- ===== Firebase SDK（顧客データを全員で共有するためのデータベース） ===== -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
(function () {
  /* ===== Firebase 設定（社内イントラと同じプロジェクト） ===== */
  var firebaseConfig = {
    apiKey: "AIzaSyBU9eSlKEuJiRl77prZvtANob8kp5mZ5u8",
    authDomain: "daito-intranet.firebaseapp.com",
    databaseURL: "https://daito-intranet-default-rtdb.firebaseio.com",
    projectId: "daito-intranet",
    storageBucket: "daito-intranet.firebasestorage.app",
    messagingSenderId: "1029120445083",
    appId: "1:1029120445083:web:4bb2ba8d5760b01330d43e"
  };

  /* ログイン用の共通アカウント（Firebase Authentication に登録するメールアドレス） */
  var LOGIN_EMAIL = "staff@daito-intranet.com";

  var auth = null, custRef = null;
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    custRef = firebase.database().ref("customers");
  } catch (e) {
    console.warn("Firebase 初期化に失敗しました", e);
    document.getElementById("db-warn").style.display = "block";
  }

  /* ===== 状態 ===== */
  var customers = [];            // {id, company, rep, importance, products[], history[], memo, updatedAt}
  var filterImp = "ALL";
  var keyword = "";
  var sortKey = "importance";
  var sortAsc = true;
  var editId = null;
  var pendingDeleteId = null;

  /* ===== ロック解除 ===== */
  function unlock() {
    document.body.classList.remove("locked");
    var ls = document.getElementById("lock-screen");
    if (ls) ls.remove();
    var s = document.getElementById("search");
    if (s) s.focus();
  }

  /* ===== ログイン（Firebase Authentication） ===== */
  var dataStarted = false;
  if (auth) {
    auth.onAuthStateChanged(function (user) {
      if (user) { unlock(); startData(); }
    });
    document.getElementById("lock-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var pw = document.getElementById("lock-password").value;
      var errEl = document.getElementById("lock-error");
      errEl.textContent = "確認中...";
      auth.signInWithEmailAndPassword(LOGIN_EMAIL, pw).catch(function (err) {
        errEl.textContent = loginErrorMessage(err);
      });
    });
  } else {
    document.getElementById("lock-error").textContent = "データベースに接続できません";
  }

  function loginErrorMessage(err) {
    var code = err && err.code;
    if (code === "auth/wrong-password" || code === "auth/invalid-credential" || code === "auth/invalid-login-credentials")
      return "パスワードが違います";
    if (code === "auth/user-not-found") return "ログインアカウントが未設定です（管理者へ）";
    if (code === "auth/operation-not-allowed" || code === "auth/configuration-not-found")
      return "ログイン認証が有効化されていません（管理者へ）";
    if (code === "auth/network-request-failed") return "通信エラーです。接続をご確認ください";
    if (code === "auth/too-many-requests") return "試行回数が多すぎます。しばらくお待ちください";
    console.warn("ログインエラー", err);
    return "ログインに失敗しました";
  }

  /* ===== ユーティリティ ===== */
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function yen(v) {
    if (v === "" || v == null) return "";
    var n = Number(String(v).replace(/[^\d.-]/g, ""));
    if (isNaN(n)) return esc(v);
    return "¥" + n.toLocaleString("ja-JP");
  }
  function impRank(imp) { return imp === "A" ? 0 : imp === "B" ? 1 : imp === "C" ? 2 : 3; }

  /* ===== 一覧描画 ===== */
  function getFiltered() {
    var kw = keyword.trim().toLowerCase();
    var list = customers.filter(function (c) {
      if (filterImp !== "ALL" && c.importance !== filterImp) return false;
      if (kw) {
        var hay = ((c.company || "") + " " + (c.rep || "")).toLowerCase();
        if (hay.indexOf(kw) === -1) return false;
      }
      return true;
    });
    list.sort(function (a, b) {
      var r = 0;
      if (sortKey === "company") r = (a.company || "").localeCompare(b.company || "", "ja");
      else if (sortKey === "rep") r = (a.rep || "").localeCompare(b.rep || "", "ja");
      else r = impRank(a.importance) - impRank(b.importance) || (a.company || "").localeCompare(b.company || "", "ja");
      return sortAsc ? r : -r;
    });
    return list;
  }

  function renderList() {
    var body = document.getElementById("cust-body");
    var list = getFiltered();
    document.getElementById("count-line").textContent =
      "全 " + customers.length + " 件" + (list.length !== customers.length ? "（表示 " + list.length + " 件）" : "");

    if (!list.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="3">' +
        (customers.length ? "該当する取引先がありません。" : "まだ取引先が登録されていません。「＋ 新規登録」から追加してください。") +
        "</td></tr>";
    } else {
      body.innerHTML = list.map(function (c) {
        return '<tr data-id="' + esc(c.id) + '">' +
          '<td class="company">' + esc(c.company || "（無名）") + "</td>" +
          '<td>' + esc(c.rep || "—") + "</td>" +
          '<td><span class="imp imp-' + esc(c.importance || "C") + '">' + esc(c.importance || "C") + "</span></td>" +
          "</tr>";
      }).join("");
    }
    // 並び替え矢印
    ["company", "rep", "importance"].forEach(function (k) {
      document.querySelector('[data-arrow="' + k + '"]').textContent =
        sortKey === k ? (sortAsc ? "▲" : "▼") : "";
    });
  }

  /* ===== 詳細モーダル ===== */
  function openDetail(id) {
    var c = customers.filter(function (x) { return x.id === id; })[0];
    if (!c) return;
    var products = c.products || [];
    var history = c.history || [];

    var prodHtml;
    if (products.length) {
      prodHtml = '<table class="detail-table"><thead><tr><th>商品名</th><th style="text-align:right;">価格</th></tr></thead><tbody>' +
        products.map(function (p) {
          return "<tr><td>" + esc(p.name || "—") + '</td><td class="num">' + esc(yen(p.price)) + "</td></tr>";
        }).join("") + "</tbody></table>";
    } else {
      prodHtml = '<div class="detail-empty">登録された取引商品はありません。</div>';
    }

    var histHtml;
    if (history.length) {
      var sortedH = history.slice().sort(function (a, b) {
        return String(b.date || "").localeCompare(String(a.date || ""));
      });
      histHtml = '<table class="detail-table"><thead><tr><th style="width:110px;">日付</th><th>内容</th><th style="text-align:right;">金額</th></tr></thead><tbody>' +
        sortedH.map(function (h) {
          return "<tr><td>" + esc(h.date || "—") + "</td><td>" + esc(h.content || "") +
            '</td><td class="num">' + esc(h.amount === "" || h.amount == null ? "" : yen(h.amount)) + "</td></tr>";
        }).join("") + "</tbody></table>";
    } else {
      histHtml = '<div class="detail-empty">取引履歴はありません。</div>';
    }

    var memoHtml = c.memo ? '<div class="detail-memo">' + esc(c.memo) + "</div>"
      : '<div class="detail-empty">メモはありません。</div>';

    document.getElementById("detail-modal").innerHTML =
      '<div class="detail-head">' +
        '<span class="imp imp-' + esc(c.importance || "C") + '">' + esc(c.importance || "C") + "</span>" +
        '<span class="detail-company">' + esc(c.company || "（無名）") + "</span>" +
      "</div>" +
      '<div class="detail-rep">営業担当：<b>' + esc(c.rep || "未設定") + "</b></div>" +
      '<div class="section-label">取引商品・価格</div>' + prodHtml +
      '<div class="section-label">取引履歴</div>' + histHtml +
      '<div class="section-label">備考・メモ</div>' + memoHtml +
      '<div class="btn-row">' +
        '<button type="button" class="act btn-danger" data-detail-del="' + esc(c.id) + '">削除</button>' +
        '<button type="button" class="act btn-secondary" data-detail-close>閉じる</button>' +
        '<button type="button" class="act btn-primary" data-detail-edit="' + esc(c.id) + '">編集</button>' +
      "</div>";
    document.getElementById("detail-overlay").classList.add("show");
  }
  function closeDetail() { document.getElementById("detail-overlay").classList.remove("show"); }

  /* ===== 動的行（商品／履歴） ===== */
  function productRow(name, price) {
    var div = document.createElement("div");
    div.className = "dyn-row";
    div.innerHTML =
      '<input type="text" class="p-name" placeholder="商品名" style="flex:2;">' +
      '<input type="number" class="p-price" placeholder="価格" style="flex:1;" min="0" step="1">' +
      '<button type="button" class="row-del" title="削除">×</button>';
    div.querySelector(".p-name").value = name || "";
    div.querySelector(".p-price").value = (price === 0 || price) ? price : "";
    div.querySelector(".row-del").addEventListener("click", function () {
      div.remove(); checkDynEmpty();
    });
    return div;
  }
  function historyRow(date, content, amount) {
    var div = document.createElement("div");
    div.className = "dyn-row";
    div.innerHTML =
      '<input type="date" class="h-date" style="flex:0 0 150px;">' +
      '<input type="text" class="h-content" placeholder="取引内容" style="flex:2;">' +
      '<input type="number" class="h-amount" placeholder="金額" style="flex:1;" min="0" step="1">' +
      '<button type="button" class="row-del" title="削除">×</button>';
    div.querySelector(".h-date").value = date || "";
    div.querySelector(".h-content").value = content || "";
    div.querySelector(".h-amount").value = (amount === 0 || amount) ? amount : "";
    div.querySelector(".row-del").addEventListener("click", function () {
      div.remove(); checkDynEmpty();
    });
    return div;
  }
  function checkDynEmpty() {
    var pr = document.getElementById("product-rows");
    var hr = document.getElementById("history-rows");
    if (!pr.querySelector(".dyn-row") && !pr.querySelector(".dyn-empty"))
      pr.innerHTML = '<div class="dyn-empty">「＋ 商品を追加」で入力できます。</div>';
    if (!hr.querySelector(".dyn-row") && !hr.querySelector(".dyn-empty"))
      hr.innerHTML = '<div class="dyn-empty">「＋ 履歴を追加」で入力できます。</div>';
  }

  /* ===== 編集モーダル ===== */
  function openEdit(id) {
    editId = id || null;
    var c = id ? customers.filter(function (x) { return x.id === id; })[0] : null;
    document.getElementById("edit-title").textContent = c ? "取引先の編集" : "新規登録";
    document.getElementById("f-company").value = c ? (c.company || "") : "";
    document.getElementById("f-rep").value = c ? (c.rep || "") : "";
    document.getElementById("f-importance").value = c ? (c.importance || "B") : "B";
    document.getElementById("f-memo").value = c ? (c.memo || "") : "";
    document.getElementById("edit-err").textContent = "";

    var pr = document.getElementById("product-rows");
    var hr = document.getElementById("history-rows");
    pr.innerHTML = ""; hr.innerHTML = "";
    var products = (c && c.products) || [];
    var history = (c && c.history) || [];
    products.forEach(function (p) { pr.appendChild(productRow(p.name, p.price)); });
    history.forEach(function (h) { hr.appendChild(historyRow(h.date, h.content, h.amount)); });
    checkDynEmpty();

    document.getElementById("edit-overlay").classList.add("show");
    document.getElementById("f-company").focus();
  }
  function closeEdit() { document.getElementById("edit-overlay").classList.remove("show"); }

  function collectRows() {
    var products = [];
    Array.prototype.forEach.call(document.querySelectorAll("#product-rows .dyn-row"), function (r) {
      var name = r.querySelector(".p-name").value.trim();
      var price = r.querySelector(".p-price").value.trim();
      if (name || price) products.push({ name: name, price: price === "" ? "" : Number(price) });
    });
    var history = [];
    Array.prototype.forEach.call(document.querySelectorAll("#history-rows .dyn-row"), function (r) {
      var date = r.querySelector(".h-date").value;
      var content = r.querySelector(".h-content").value.trim();
      var amount = r.querySelector(".h-amount").value.trim();
      if (date || content || amount) history.push({ date: date, content: content, amount: amount === "" ? "" : Number(amount) });
    });
    return { products: products, history: history };
  }

  function saveEdit() {
    var company = document.getElementById("f-company").value.trim();
    if (!company) {
      document.getElementById("edit-err").textContent = "取引先企業名を入力してください。";
      document.getElementById("f-company").focus();
      return;
    }
    if (!custRef) {
      document.getElementById("edit-err").textContent = "データベースに接続できないため保存できません。";
      return;
    }
    var rows = collectRows();
    var record = {
      company: company,
      rep: document.getElementById("f-rep").value.trim(),
      importance: document.getElementById("f-importance").value,
      memo: document.getElementById("f-memo").value.trim(),
      products: rows.products,
      history: rows.history,
      updatedAt: Date.now()
    };
    var saveBtn = document.getElementById("edit-save");
    saveBtn.disabled = true;
    var ref = editId ? custRef.child(editId) : custRef.push();
    ref.set(record).then(function () {
      saveBtn.disabled = false;
      closeEdit();
    }).catch(function (err) {
      saveBtn.disabled = false;
      console.warn("保存に失敗しました", err);
      document.getElementById("edit-err").textContent = "保存に失敗しました。もう一度お試しください。";
    });
  }

  /* ===== 削除 ===== */
  function askDelete(id) {
    var c = customers.filter(function (x) { return x.id === id; })[0];
    if (!c) return;
    pendingDeleteId = id;
    document.getElementById("confirm-msg").innerHTML =
      "「<b>" + esc(c.company || "（無名）") + "</b>」を削除します。<br>この操作は元に戻せません。";
    document.getElementById("confirm-overlay").classList.add("show");
  }
  function doDelete() {
    if (!pendingDeleteId || !custRef) { closeConfirm(); return; }
    var okBtn = document.getElementById("confirm-ok");
    okBtn.disabled = true;
    custRef.child(pendingDeleteId).remove().then(function () {
      okBtn.disabled = false;
      closeConfirm();
      closeDetail();
    }).catch(function (err) {
      okBtn.disabled = false;
      console.warn("削除に失敗しました", err);
      alert("削除に失敗しました。もう一度お試しください。");
    });
  }
  function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById("confirm-overlay").classList.remove("show");
  }

  /* ===== Firebase 監視（ログイン後に開始） ===== */
  function startData() {
    if (!custRef) { renderList(); return; }
    if (dataStarted) return;
    dataStarted = true;
    custRef.on("value", function (snapshot) {
      var val = snapshot.val() || {};
      customers = Object.keys(val).map(function (k) {
        var v = val[k] || {};
        return {
          id: k,
          company: v.company || "",
          rep: v.rep || "",
          importance: v.importance || "C",
          products: Array.isArray(v.products) ? v.products : [],
          history: Array.isArray(v.history) ? v.history : [],
          memo: v.memo || "",
          updatedAt: v.updatedAt || 0
        };
      });
      document.getElementById("db-warn").style.display = "none";
      renderList();
    }, function (err) {
      console.warn("顧客データの読み込みに失敗しました", err);
      document.getElementById("db-warn").style.display = "block";
    });
  }

  /* ===== イベント登録 ===== */
  document.getElementById("search").addEventListener("input", function () {
    keyword = this.value; renderList();
  });
  Array.prototype.forEach.call(document.querySelectorAll("#imp-filter .filter-btn"), function (b) {
    b.addEventListener("click", function () {
      document.querySelectorAll("#imp-filter .filter-btn").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active");
      filterImp = b.getAttribute("data-imp");
      renderList();
    });
  });
  Array.prototype.forEach.call(document.querySelectorAll("thead th.sortable"), function (th) {
    th.addEventListener("click", function () {
      var k = th.getAttribute("data-sort");
      if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; }
      renderList();
    });
  });
  document.getElementById("cust-body").addEventListener("click", function (e) {
    var tr = e.target.closest("tr[data-id]");
    if (tr) openDetail(tr.getAttribute("data-id"));
  });
  document.getElementById("add-btn").addEventListener("click", function () { openEdit(null); });
  document.getElementById("add-product").addEventListener("click", function () {
    var pr = document.getElementById("product-rows");
    var empty = pr.querySelector(".dyn-empty"); if (empty) empty.remove();
    pr.appendChild(productRow("", ""));
    pr.lastChild.querySelector(".p-name").focus();
  });
  document.getElementById("add-history").addEventListener("click", function () {
    var hr = document.getElementById("history-rows");
    var empty = hr.querySelector(".dyn-empty"); if (empty) empty.remove();
    hr.appendChild(historyRow("", "", ""));
    hr.lastChild.querySelector(".h-content").focus();
  });
  document.getElementById("edit-save").addEventListener("click", saveEdit);
  document.getElementById("edit-cancel").addEventListener("click", closeEdit);

  // 詳細モーダル内のボタン（委任）
  document.getElementById("detail-modal").addEventListener("click", function (e) {
    var t = e.target;
    if (t.hasAttribute("data-detail-close")) closeDetail();
    else if (t.hasAttribute("data-detail-edit")) { var id = t.getAttribute("data-detail-edit"); closeDetail(); openEdit(id); }
    else if (t.hasAttribute("data-detail-del")) askDelete(t.getAttribute("data-detail-del"));
  });
  document.getElementById("confirm-ok").addEventListener("click", doDelete);
  document.getElementById("confirm-cancel").addEventListener("click", closeConfirm);

  // オーバーレイの外側クリックで閉じる
  ["detail-overlay", "edit-overlay", "confirm-overlay"].forEach(function (idv) {
    document.getElementById(idv).addEventListener("click", function (e) {
      if (e.target === this) this.classList.remove("show");
    });
  });
  // Escで閉じる
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      document.querySelectorAll(".overlay.show").forEach(function (o) { o.classList.remove("show"); });
    }
  });
})();
</script>

</body>
</html>
